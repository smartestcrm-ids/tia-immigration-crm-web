server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for the bundle.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml application/xml+rss
               text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Long-cache for hashed assets (Vite emits content-hashed filenames).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: any unknown path falls back to index.html so React Router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Tiny health check for Coolify / uptime monitors.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
